<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flipbook Ultra</title>

    <!-- PageFlip CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/page-flip/dist/css/page-flip.css">

    <style>
        body {
            margin: 0;
            background: #111;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        #sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 260px;
            height: 100vh;
            background: #1a1a1a;
            padding: 20px;
            overflow-y: auto;
            border-right: 2px solid #333;
        }

        #viewer {
            margin-left: 260px;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        /* Spinner */
        #loadingSpinner {
            width: 60px;
            height: 60px;
            border: 6px solid #444;
            border-top: 6px solid #00aaff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
#sidebar h2 {
    margin-top: 0;
    font-size: 20px;
    color: #00aaff;
}

#sidebar button {
    width: 100%;
    padding: 12px;
    margin: 6px 0;
    background: #222;
    color: white;
    border: 1px solid #333;
    cursor: pointer;
    text-align: left;
    font-size: 15px;
    border-radius: 4px;
    transition: 0.2s;
}

#sidebar button:hover {
    background: #00aaff;
    color: black;
}
#viewer {
    position: relative;
    background: #000;
    overflow: hidden;
}

#flipbook {
    width: 90%;
    height: 90%;
    box-shadow: 0 0 40px rgba(0,0,0,0.8);
    border-radius: 6px;
    transform: translateZ(0);
}

    </style>
</head>
<div id="viewer">
    <div id="loadingSpinner"></div>
    <div id="flipbook"></div>
</div>
